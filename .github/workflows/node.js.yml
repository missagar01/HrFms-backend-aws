name: Deploy HRFMS Backend (EC2 Self-Hosted)

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false   # 🔥 VERY IMPORTANT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Ensure .env exists (DO NOT overwrite)
        run: |
          if [ ! -f .env ]; then
            echo "❌ .env missing! Create it manually using nano .env"
            exit 1
          fi
          chmod 600 .env
          echo "✅ .env preserved"

      - name: Install dependencies
        run: npm install

      - name: Restart PM2
        run: |
          pm2 describe hrfms-backend >/dev/null 2>&1 || \
          pm2 start server.js --name hrfms-backend --time
          pm2 restart hrfms-backend --update-env
          pm2 save
