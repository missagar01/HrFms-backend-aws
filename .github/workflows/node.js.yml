name: Deploy HRFMS Backend (EC2 Self-Hosted)

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Preserve .env
        run: |
          if [ -f .env ]; then
            cp .env /tmp/.env.bak
            echo "✅ .env backed up"
          else
            echo "⚠️ No .env found to backup"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Restore .env
        run: |
          if [ -f /tmp/.env.bak ]; then
            cp /tmp/.env.bak .env
            echo "✅ .env restored"
          else
            echo "❌ .env missing! Create it manually"
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Restart PM2
        run: |
          pm2 describe hrfms-backend >/dev/null 2>&1 || \
          pm2 start server.js --name hrfms-backend --time
          pm2 restart hrfms-backend --update-env
          pm2 save
